name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            archive: tar.gz
            artifact: linux

          - os: windows-latest
            archive: zip
            artifact: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

###########################################################
# Ubuntu
###########################################################

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev \
            libargon2-dev

      - name: Configure (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake --build build --config Release

###########################################################
# Windows
###########################################################

      - name: Setup MSYS2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

          install: >
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-argon2
            zip

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake --build build --config Release

###########################################################
# Package
###########################################################

      - name: Package (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir package

          cp build/bin/lptv package/
          cp README.md package/

          if [ -f LICENSE ]; then
            cp LICENSE package/
          fi

          tar -czf LPTV-${{ github.ref_name }}-linux-x64.tar.gz package

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir package

          cp build/bin/lptv.exe package/
          cp README.md package/

          if [ -f LICENSE ]; then
            cp LICENSE package/
          fi

          cd package
          zip -r ../LPTV-${{ github.ref_name }}-windows-x64.zip *

###########################################################
# Release
###########################################################

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE.md
          files: |
            *.zip
            *.tar.gz
